name: Publish Revocations Feed

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install boto3 cryptography PyJWT[crypto]
      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Export revocation authority public keys
        run: python scripts/export_revocation_authority_public_keys.py
        env:
          REVOCATION_SIGNING_PROVIDER: aws_kms
          REVOCATION_SIGNING_KID: ${{ secrets.REVOCATION_SIGNING_KID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_KMS_REVOCATION_KEY_ID: ${{ secrets.AWS_KMS_REVOCATION_KEY_ID }}
      - name: Generate and sign revocation feed
        run: |
          python scripts/generate_revocation_feed.py
          python scripts/sign_revocation_feed.py
          python scripts/verify_revocation_feed.py
        env:
          REVOCATION_SIGNING_PROVIDER: aws_kms
          REVOCATION_SIGNING_KID: ${{ secrets.REVOCATION_SIGNING_KID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_KMS_REVOCATION_KEY_ID: ${{ secrets.AWS_KMS_REVOCATION_KEY_ID }}
          AWS_KMS_SIGNING_ALG: ${{ secrets.AWS_KMS_SIGNING_ALG }}
      - name: Publish to gh-pages
        run: |
          mkdir -p out
          cp REVOCATION_FEED.json out/
          cp KEY_REVOCATIONS.json out/
          cp REVOCATION_AUTHORITY_PUBLIC_KEYS.json out/
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages
          rm -rf *
          cp -r out/* .
          git add .
          git commit -m "Publish revocation feed" || true
          git push origin gh-pages
